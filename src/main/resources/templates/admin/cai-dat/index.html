<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/admin-layout :: layout('Cài Đặt Hệ Thống - Admin', 'cai-dat', ~{::section})}">
<head>
    <title>Cài Đặt Hệ Thống - Admin</title>
</head>
<body>
    <section>
        <!-- Import Bootstrap and FontAwesome -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="h4 mb-1 text-primary fw-bold"><i class="fas fa-cogs me-2"></i> Cấu Hình Hệ Thống</h2>
                    <p class="text-muted small mb-0">Quản lý và tùy chỉnh các tham số hoạt động của phòng khám</p>
                </div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a></li>
                        <li class="breadcrumb-item active">Cài đặt</li>
                    </ol>
                </nav>
            </div>

            <!-- Card UI -->
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm" style="border-radius: 12px; overflow: hidden;">
                        <div class="card-header bg-white border-bottom py-3 d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                                <i class="fas fa-sliders-h"></i>
                            </div>
                            <h5 class="card-title mb-0 fw-bold text-dark">Thông Số Cài Đặt Chung</h5>
                        </div>
                        
                        <div class="card-body p-4 bg-light">
                            <form th:action="@{/admin/cai-dat/luu}" method="post">
                                <div class="row g-4">
                                    <div th:each="setting : ${settings}" class="col-md-6">
                                        <div class="form-floating shadow-sm">
                                            <input type="text" class="form-control border-0" 
                                                   th:id="${'input_' + setting.tenCaiDat}" 
                                                   th:name="${setting.tenCaiDat}" 
                                                   th:value="${setting.giaTri}" 
                                                   placeholder="Nhập giá trị">
                                            <label th:for="${'input_' + setting.tenCaiDat}" class="text-primary fw-bold">
                                                <i class="fas fa-hashtag me-1 opacity-50"></i> <span th:text="${setting.tenCaiDat}"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                
                                <hr class="my-4 text-muted">
                                
                                <div class="d-flex justify-content-end gap-2">
                                    <button type="reset" class="btn btn-light px-4 py-2 border"><i class="fas fa-undo me-2"></i> Hủy Bỏ</button>
                                    <button type="submit" class="btn btn-primary px-5 py-2 shadow-sm" style="border-radius: 8px;">
                                        <i class="fas fa-save me-2"></i> Lưu Cài Đặt
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
