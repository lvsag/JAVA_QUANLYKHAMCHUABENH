<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/admin-layout :: layout(~{::title}, 'cai-dat', ~{::section})}">
<head>
    <title>Cài Đặt Hệ Thống - Admin</title>
</head>
<body>
    <section>
        <div class="header">
            <h1>Cài Đặt Hệ Thống</h1>
        </div>
        
        <div class="card" style="max-width: 600px;">
            <form th:action="@{/admin/cai-dat/luu}" method="post">
                <div th:each="setting : ${settings}" class="form-group">
                    <label th:text="${setting.tenCaiDat}"></label>
                    <input type="text" th:name="${setting.tenCaiDat}" th:value="${setting.giaTri}" class="form-control">
                </div>
                
                <button type="submit" class="btn btn-primary">Lưu Cài Đặt</button>
            </form>
        </div>
    </section>
</body>
</html>
