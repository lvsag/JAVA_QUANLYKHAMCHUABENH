<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>403 - Forbidden Access</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f8f9fc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            max-width: 500px;
        }
        .error-code {
            font-size: 80px;
            font-weight: 800;
            color: #dc3545;
            margin-bottom: 0;
            line-height: 1;
        }
        .error-icon {
            font-size: 60px;
            color: #dc3545;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 24px;
            color: #343a40;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .error-desc {
            color: #6c757d;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <i class="fas fa-lock error-icon"></i>
        <div class="error-code">403</div>
        <div class="error-message">Truy Cập Bị Từ Chối!</div>
        <div class="error-desc">
            Rất tiếc, bạn không có quyền (Authorization) để truy cập vào trang này. Vui lòng liên hệ quản trị viên nếu bạn cho rằng đây là sự nhầm lẫn.
        </div>
        <a th:href="@{/home}" class="btn btn-primary px-4 py-2 rounded-pill">
            <i class="fas fa-home me-2"></i> Trở về Trang chủ
        </a>
    </div>
</body>
</html>
