spring.application.name=BaoCaoDoAn

# ============================================================
# ============================================================
# MySQL Connection
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/phongkhamdakhoa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ============================================================
# JPA / Hibernate
# ddl-auto=none vi ban da import database san vao MySQL
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ============================================================
# Server
# ============================================================
server.port=8081
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
