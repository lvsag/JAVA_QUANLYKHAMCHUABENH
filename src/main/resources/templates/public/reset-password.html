<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật mật khẩu - Phòng Khám Đa Khoa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .box h2 { color: #1E3A8A; margin-top: 0; margin-bottom: 10px; font-weight: 700; }
        .box p { color: #64748B; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1.5px solid #E2E8F0; border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; box-sizing: border-box; outline: none; transition: all 0.2s; }
        .form-group input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-submit { width: 100%; padding: 14px; background: #2563EB; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #1D4ED8; }
        .error-msg { background: #FEF2F2; color: #DC2626; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: left; border: 1px solid #FCA5A5; }
        .success-msg { color: #16A34A; font-size: 14px; margin-bottom: 20px; text-align: left; background: #DCFCE7; padding: 12px; border-radius: 8px; border: 1px solid #86EFAC; }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size: 40px; margin-bottom: 10px;">🔑</div>
        <h2>Cập Nhật Mật Khẩu</h2>
        
        <div th:if="${error}" class="error-msg" th:text="${error}"></div>
        <div th:if="${success}" class="success-msg">
            <span th:text="${success}"></span>
            <div style="margin-top: 10px; text-align: center;">
                <a href="/login" style="color: #166534; font-weight: bold; text-decoration: underline;">Đăng nhập ngay</a>
            </div>
        </div>
        
        <div th:if="${success == null}">
            <p>Vui lòng nhập mật khẩu mới. Mật khẩu phải chứa ít nhất 1 chữ số và 1 ký tự đặc biệt.</p>
            <form action="/reset-password" method="post">
                <div class="form-group">
                    <label>Mật khẩu mới</label>
                    <input type="password" name="newPassword" placeholder="••••••••" required pattern="(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':\\|,.<>\/?]).+" title="Mật khẩu phải chứa ít nhất 1 chữ số và 1 ký tự đặc biệt">
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" name="confirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Lưu Mật Khẩu</button>
            </form>
        </div>
    </div>
</body>
</html>
