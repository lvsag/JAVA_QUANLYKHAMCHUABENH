<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Phòng Khám Đa Khoa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #F8FAFC;
        }
        
        /* Left Panel - Branding */
        .left-panel {
            flex: 1.2;
            background: linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        .left-panel .icon { font-size: 80px; margin-bottom: 20px; }
        .left-panel h1 { font-size: 32px; font-weight: 700; margin: 0 0 10px 0; }
        .left-panel p { font-size: 16px; color: #BFDBFE; font-weight: 300; margin: 0; max-width: 300px; line-height: 1.5; }
        
        /* Right Panel - Login Form */
        .right-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #FFFFFF;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
        }
        .login-box h2 {
            font-size: 24px;
            font-weight: 700;
            color: #0F172A;
            margin: 0 0 30px 0;
            text-align: center;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 8px; }
        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #E2E8F0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            background-color: #F8FAFC;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .form-group input:focus { border-color: #2563EB; background-color: #FFF; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .form-options label { font-size: 13px; color: #475569; display: flex; align-items: center; cursor: pointer; }
        .form-options input[type="checkbox"] { margin-right: 8px; cursor: pointer; }
        .forgot-password { font-size: 13px; color: #2563EB; text-decoration: none; font-weight: 500; }
        .forgot-password:hover { text-decoration: underline; }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #2563EB;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37,99,235,0.2);
            transition: background 0.2s, transform 0.1s;
        }
        .btn-submit:hover { background-color: #1D4ED8; }
        .btn-submit:active { transform: translateY(1px); }
        
        .error-msg { color: #DC2626; font-size: 14px; margin-top: 15px; text-align: center; background: #FEF2F2; padding: 10px; border-radius: 6px; border: 1px solid #FCA5A5; }
        
        .social-login { margin-top: 30px; text-align: center; }
        .social-login p { font-size: 13px; color: #64748B; margin-bottom: 15px; position: relative; }
        .social-login p::before, .social-login p::after { content: ""; position: absolute; top: 50%; width: 30%; height: 1px; background: #E2E8F0; }
        .social-login p::before { left: 0; }
        .social-login p::after { right: 0; }
        
        .social-buttons { display: flex; gap: 15px; }
        .btn-social {
            flex: 1;
            padding: 10px;
            background: white;
            border: 1.5px solid #E2E8F0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn-social:hover { background: #F8FAFC; }
        
        .register-link { margin-top: 25px; text-align: center; font-size: 14px; color: #475569; }
        .register-link a { color: #2563EB; font-weight: 600; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="icon">🏥</div>
        <h1>PHÒNG KHÁM ĐA KHOA</h1>
        <p>Hệ thống quản lý khám chữa bệnh chuyên nghiệp, hiện đại, và tận tâm.</p>
    </div>
    
    <div class="right-panel">
        <div class="login-box">
            <h2>ĐĂNG NHẬP HỆ THỐNG</h2>
            
            <form action="/login" method="post">
                <div class="form-group">
                    <label>Email / Tên đăng nhập</label>
                    <input type="text" name="username" placeholder="✉ example@email.com" required />
                </div>
                
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" placeholder="🔒 ••••••••••" required />
                </div>
                
                <div class="form-options">
                    <label><input type="checkbox" name="remember" /> Ghi nhớ đăng nhập</label>
                    <a href="/forgot-password" class="forgot-password">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
                
                <div th:if="${error}" class="error-msg" th:text="${error}"></div>
            </form>
            
            <div class="social-login">
                <p>Hoặc đăng nhập với</p>
                <div class="social-buttons">
                    <button class="btn-social">🔵 Google</button>
                    <button class="btn-social" style="background: #1877F2; color: white; border: none;">🔵 Facebook</button>
                </div>
            </div>
            
            <div class="register-link">
                Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
            </div>
        </div>
    </div>

</body>
</html>
