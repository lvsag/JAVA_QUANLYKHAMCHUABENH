<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{fragments/admin-layout :: layout('Quản Lý Phòng Bệnh', 'phong-benh', ~{::section})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <section>
        <style>
            .stats-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                margin-bottom: 24px;
            }
            .stat-card {
                background: white;
                padding: 20px;
                border-radius: 8px;
                border: 1px solid var(--border-color);
                display: flex;
                align-items: center;
                gap: 16px;
            }
            .stat-icon {
                width: 48px;
                height: 48px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
            }
            .stat-info h3 { font-size: 24px; font-weight: 700; color: var(--text-main); }
            .stat-info p { font-size: 14px; color: var(--text-light); }
            
            .panel {
                background: white;
                border-radius: 8px;
                border: 1px solid var(--border-color);
                margin-bottom: 20px;
            }
            .panel-header {
                padding: 16px 20px;
                border-bottom: 1px solid var(--border-color);
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: #F8FAFC;
                border-radius: 8px 8px 0 0;
            }
            .panel-header h2 { font-size: 16px; font-weight: 600; color: var(--accent-blue); }
            .panel-content { padding: 20px; overflow-x: auto; }
            
            table { width: 100%; border-collapse: collapse; font-size: 14px; }
            th { text-align: left; padding: 12px; background: #F1F5F9; color: var(--text-light); font-weight: 600; border-bottom: 1px solid var(--border-color); }
            td { padding: 12px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
            
            .badge { 
                padding: 4px 12px; 
                border-radius: 4px; 
                font-size: 12px; 
                font-weight: 500;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 100px;
            }
            .badge-success { background: #DCFCE7; color: #166534; }
            .badge-warning { background: #FEF3C7; color: #92400E; }
            .badge-danger { background: #FEE2E2; color: #991B1B; }
            
            .btn-sm { padding: 6px 10px; border-radius: 4px; font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: 0.2s; }
            .btn-add { background: var(--accent-blue); color: white; }
            .btn-view { background: #E0F2FE; color: #0369A1; }
            .btn-edit { background: #F1F5F9; color: var(--text-main); }
            .btn-delete { background: #FEF2F2; color: #EF4444; }
        </style>

        <!-- Thống kê -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon" style="background: #DBEAFE; color: #2563EB;">🏨</div>
                <div class="stat-info">
                    <h3 th:text="${tongSoPhong}">0</h3>
                    <p>Tổng số phòng</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #DCFCE7; color: #166534;">✅</div>
                <div class="stat-info">
                    <h3 th:text="${soPhongHoatDong}">0</h3>
                    <p>Đang nhận bệnh</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #FEF3C7; color: #92400E;">🔧</div>
                <div class="stat-info">
                    <h3 th:text="${soPhongBaoTri}">0</h3>
                    <p>Đang bảo trì</p>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <h2>📋 Danh Sách Phòng Bệnh</h2>
                    <!-- Bộ lọc chuyên khoa -->
                    <form th:action="@{/admin/phong-benh}" method="get" style="display: flex; align-items: center; gap: 8px;">
                        <select name="maChuyenKhoa" style="padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); font-size: 13px; color: var(--text-main); outline: none;">
                            <option value="all">Tất cả chuyên khoa</option>
                            <option th:each="ck : ${listChuyenKhoa}" 
                                    th:value="${ck.maChuyenKhoa}" 
                                    th:text="${ck.tenChuyenKhoa}"
                                    th:selected="${ck.maChuyenKhoa == selectedMaChuyenKhoa}">Chuyên khoa</option>
                        </select>
                        <button type="submit" class="btn-sm" style="background: var(--accent-blue); color: white; border: none; cursor: pointer;">Lọc</button>
                    </form>
                </div>
                <a th:href="@{/admin/phong-benh/them}" class="btn-sm btn-add">+ Thêm phòng</a>
            </div>
            
            <!-- Thông báo thành công -->
            <div th:if="${success}" style="margin: 20px 20px 0 20px; padding: 12px; border-radius: 4px; border: 1px solid #c3e6cb; background-color: #d4edda; color: #155724; font-size: 14px;">
                <span th:text="${success}"></span>
            </div>

            <div class="panel-content">
                <table>
                    <thead>
                        <tr>
                            <th>Mã phòng</th>
                            <th>Chuyên khoa</th>
                            <th>Loại phòng</th>
                            <th>Số giường</th>
                            <th>Bác sĩ phụ trách</th>
                            <th>Trạng thái</th>
                            <th style="width: 200px;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${danhSachPhong}">
                            <td th:text="${p.maPhong}" style="font-weight: 600;">P001</td>
                            <td th:text="${p.chuyenKhoa != null ? p.chuyenKhoa.tenChuyenKhoa : 'Chưa rõ'}">Khoa</td>
                            <td th:text="${p.loaiPhong}">Thường</td>
                            <td>
                                <span th:text="${p.soGiuongDangDung + '/' + (mapTongGiuong != null ? mapTongGiuong.get(p.maPhong) : 0) + '/' + p.soGiuongToiDa}">0/0/10</span>
                                <small style="display:block; color:#64748B; font-size: 11px;">(Có người / Đã tạo / Tối đa)</small>
                            </td>
                            <td th:text="${p.bacSiPhuTrach != null ? p.bacSiPhuTrach.hoTen : 'Chưa có'}">BS. A</td>
                            <td>
                                <span th:class="${p.trangThai == 'Còn nhận' ? 'badge badge-success' : (p.trangThai == 'Bảo trì' ? 'badge badge-warning' : 'badge badge-danger')}"
                                      th:text="${p.trangThai}">Còn nhận</span>
                            </td>
                            <td>
                                <div style="display: flex; gap: 6px;">
                                    <a th:href="@{/admin/phong-benh/dong-bo-giuong/{id}(id=${p.maPhong})}" 
                                       class="btn-sm" style="background-color: #17a2b8; color: white; text-decoration: none; border-radius: 4px; padding: 4px 8px; font-size: 0.85rem;" 
                                       title="Đồng bộ giường">🔄 Đồng bộ</a>
                                    <a th:href="@{/admin/phong-benh/sua/{id}(id=${p.maPhong})}" class="btn-sm btn-edit" title="Sửa">✏️ Sửa</a>
                                    <a th:href="@{/admin/phong-benh/xoa/{id}(id=${p.maPhong})}" 
                                       class="btn-sm btn-delete" 
                                       onclick="return confirm('Xác nhận xóa phòng này?')" title="Xóa">🗑️ Xóa</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(danhSachPhong)}">
                            <td colspan="7" style="text-align: center; color: var(--text-light); padding: 40px 0;">
                                Chưa có dữ liệu phòng bệnh.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
